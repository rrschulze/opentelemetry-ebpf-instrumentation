services:
  edge-nginx:
    image: nginx:1.31.3-alpine@sha256:2776cd5b70d8983e27e9f5c90abee3d24c690014ae8ecbb529572d954a459096
    container_name: edge-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./docker/edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1
      - recommendations-v2

  recommendations-v1:
    image: nginx:1.31.3-alpine@sha256:2776cd5b70d8983e27e9f5c90abee3d24c690014ae8ecbb529572d954a459096
    container_name: recommendations-v1
    volumes:
      - ./docker/recommendations-v1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro

  recommendations-v2:
    image: nginx:1.31.3-alpine@sha256:2776cd5b70d8983e27e9f5c90abee3d24c690014ae8ecbb529572d954a459096
    container_name: recommendations-v2
    volumes:
      - ./docker/recommendations-v2/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./k8s/shared:/etc/nginx/shared:ro
    depends_on:
      - recommendations-v1

  traffic-generator:
    build:
      context: .
      dockerfile: traffic-runner/Dockerfile
    container_name: nginx-traffic-generator
    command:
      - --base-url
      - http://edge-nginx:8080
      - --progress-seconds
      - "15"
    depends_on:
      - edge-nginx

  obi:
    image: ${OBI_IMAGE:-otel/ebpf-instrument:v0.10.0@sha256:9c66cdb920202b9502e6f1b8e9b238757848eded40a0aad262976d6ebea23b02}
    container_name: obi-nginx-example
    command:
      - --config=/config/obi-config.yaml
    pid: host
    privileged: true
    volumes:
      - ./docker/obi-config.yaml:/config/obi-config.yaml:ro
    depends_on:
      - edge-nginx
      - recommendations-v1
      - recommendations-v2
      - traffic-generator
      - lgtm

  lgtm:
    image: grafana/otel-lgtm:0.29.1@sha256:b4da8bf6b1b44f6f683883869619eb9781465c642ce5f2d70591fb27094ddb1c
    container_name: lgtm-nginx-example
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
