receivers:
  otlp:
    protocols:
      http:
        endpoint: /var/run/obi-otlp/metrics.sock
        transport: unix
exporters:
  prometheus:
    endpoint: "otelcol:9464"
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true
service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [prometheus]
