name: Setup LVH kernel
description: |
  Cache + resolve a kernel artifact from quay.io/lvh-images/kernel-images.
  Pulls the kernel on cache miss, populates lvh/out/, and exports the
  absolute paths the launchvm Makefile target consumes.

inputs:
  kernel-id:
    description: 'kernels.yaml entry id (e.g. 6.12-lts, rhel8.9)'
    required: true
  lvh-tag:
    description: 'Pinned LVH tag (e.g. 6.12-20260504.013701). Used as cache key.'
    required: true

outputs:
  kernel:
    description: 'Absolute path to vmlinuz'
    value: ${{ steps.resolve.outputs.kernel }}
  modules-dir:
    description: 'Absolute path to /lib/modules tree (flat, ready for 9p mount)'
    value: ${{ steps.resolve.outputs.modules-dir }}

runs:
  using: composite
  steps:
    - name: Cache LVH kernel artifacts
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          internal/test/vm/lvh/out/vmlinuz-${{ inputs.kernel-id }}-amd64
          internal/test/vm/lvh/out/vmlinuz-${{ inputs.kernel-id }}-amd64.config
          internal/test/vm/lvh/out/vmlinuz-${{ inputs.kernel-id }}-amd64.buildinfo
          internal/test/vm/lvh/out/modules-${{ inputs.kernel-id }}-amd64
        key: lvh-${{ inputs.lvh-tag }}-amd64

    - name: Resolve kernel (pull from LVH if needed)
      id: resolve
      shell: bash
      env:
        KERNEL_ID: ${{ inputs.kernel-id }}
      run: |
        eval "$(bash internal/test/vm/prepare-kernel.sh "$KERNEL_ID" amd64)"
        echo "kernel=$KERNEL" >> "$GITHUB_OUTPUT"
        echo "modules-dir=$MODULES_DIR" >> "$GITHUB_OUTPUT"
        echo "Kernel:  $KERNEL"
        echo "Modules: $MODULES_DIR"
